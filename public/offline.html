<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Report Generator</title>
    <style>
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #f3f4f6; color: #111827; font-family: system-ui, sans-serif; text-align: center; padding: 24px;
        }
        .card { max-width: 360px; }
        .logo { width: 72px; height: 72px; border-radius: 16px; margin: 0 auto 20px; display: block; }
        h1 { font-size: 20px; margin: 0 0 8px; }
        p { color: #6b7280; font-size: 14px; line-height: 1.5; margin: 0 0 20px; }
        button {
            background: #4f46e5; color: #fff; border: 0; border-radius: 8px;
            padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
        }
        button:hover { background: #4338ca; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/icons/icon-192.png" alt="Report Generator" class="logo">
        <h1>You're offline</h1>
        <p>Report Generator needs a connection to load this page. Your saved reports will be here when you're back online.</p>
        <button type="button" onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
